version: 2

project_name: clipsh

before:
  hooks:
    - go mod tidy

builds:
  - id: clipsh
    main: ./cmd/clipsh
    binary: clipsh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: '{{ .ProjectName }}_checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

brews:
  - name: clipsh
    repository:
      owner: pajikos
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
    homepage: 'https://github.com/pajikos/clipsh'
    description: 'Clipboard transport over SSH — screenshots, text, or any file.'
    license: MIT
    test: |
      system "#{bin}/clipsh --version"
    install: |
      bin.install "clipsh"
    dependencies:
      - name: pngpaste
        type: optional
