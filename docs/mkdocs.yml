site_name: clipsh
site_description: Clipboard transport over SSH
site_url: https://pajikos.github.io/clipsh/
repo_url: https://github.com/pajikos/clipsh
repo_name: pajikos/clipsh
docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - toc.follow

nav:
  - Home: index.md
  - Install: install.md
  - Usage: usage.md
  - Configuration: config.md
  - Examples: examples.md
  - vs clipssh: vs-clipssh.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
