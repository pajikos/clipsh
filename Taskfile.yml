version: '3'

tasks:
  default:
    cmds: [task --list]
    silent: true

  build:
    desc: Build the clipsh binary into ./clipsh
    cmds:
      - go build -ldflags "-X main.version=$(git describe --tags --always --dirty)" -o clipsh ./cmd/clipsh

  test:
    desc: Run unit tests with race detector
    cmds:
      - go test -race -count=1 ./...

  lint:
    desc: Run go vet + golangci-lint
    cmds:
      - go vet ./...
      - golangci-lint run

  tidy:
    desc: Tidy go.mod
    cmds:
      - go mod tidy

  docs-serve:
    desc: Serve the mkdocs site locally at :8000
    cmds:
      - mkdocs serve -f docs/mkdocs.yml

  snapshot:
    desc: Build a goreleaser snapshot (no tag required)
    cmds:
      - goreleaser release --snapshot --clean

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf clipsh dist/ site/
